# Hard request-body cap at the reverse proxy (v0.5 Phase 4 / M1, ADR 0009)
# =========================================================================
# The app already caps bodies in two places (app/main.py): a Content-Length
# pre-check middleware and per-file streaming caps in /v1/generate. Those are
# defense-in-depth INSIDE the process. This file is the OUTER hard cap: a
# request that exceeds it is rejected at the edge before it ever reaches the
# app worker, so a malicious large/chunked upload can't tie up a worker.
#
# Sizing: keep the proxy cap a little ABOVE the app's CRAM_MAX_TOTAL_BYTES
# (default 32 MiB) so legitimate max-size uploads still reach the app and get
# the app's friendly 413 JSON, while anything absurd is killed at the edge.
#   CRAM_MAX_TOTAL_BYTES = 32 MiB  ->  proxy cap ~= 36m  (32 MiB + multipart overhead)
# If you lower CRAM_MAX_TOTAL_BYTES in prod, lower the proxy cap to match.

# --- nginx -----------------------------------------------------------------
# In the server{} (or location /v1/ {}) block fronting the app:
#
#   client_max_body_size 36m;
#   # Optional: fail fast instead of buffering a slow giant upload.
#   client_body_timeout 30s;
#
# nginx returns 413 (Request Entity Too Large) on its own once exceeded.

# --- Caddy -----------------------------------------------------------------
# In the site block fronting the app:
#
#   request_body {
#       max_size 36MB
#   }
#
# Caddy returns 413 once exceeded.

# --- Traefik (middleware) --------------------------------------------------
#   http:
#     middlewares:
#       cram-bodylimit:
#         buffering:
#           maxRequestBodyBytes: 37748736   # 36 MiB
# Attach the middleware to the router fronting the app.
