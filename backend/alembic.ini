# Alembic configuration (ADR 0007). The database URL is NOT set here — env.py reads it
# from the app Settings (DATABASE_DIRECT_URL, falling back to DATABASE_URL) so the
# connection string lives only in the gitignored .env, never in a tracked file.

[alembic]
script_location = alembic
prepend_sys_path = .
# Use OS-native path separators for generated version files (Windows-friendly).
version_path_separator = os

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
